<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Authorization</title>
        <style></style>
    </head>
    <body>
        <h1>Authorization</h1>
        <p>Application <strong>__APPLICATION_NAME__</strong> is requesting access to your account.</p>
        <form method="POST" action="/oauth/authorize">
            <input type="hidden" name="client_id" value="__CLIENT_ID__">
            <input type="hidden" name="redirect_uri" value="__REDIRECT_URI__">
            <input type="hidden" name="state" value="__STATE__">
            <input type="hidden" name="response_type" value="code">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" name="action" value="approve">Approve</button>
            <button type="submit" name="action" value="deny">Deny</button>
        </form>
    </body>
</html>
